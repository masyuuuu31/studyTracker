<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>パスワード再設定</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
</head>
<body>
<div class="container">
    <h2 class="mt-5 mb-3">パスワード再設定</h2>

    <form>
        <!-- ここに前ページ入力されたメールアドレスを入力 -->
        <div class="mb-3">
            <label for="inputPassword5" class="form-label">メールアドレス</label>
            <p class="mb-3">yuta.nishizawa@gmail.com</p>
        </div>
        <!-- ここまで -->
        <div class="mb-3">
            <label for="inputPassword5" class="form-label">パスワード</label>
            <input type="password" id="inputPassword5" class="form-control" aria-labelledby="passwordHelpBlock">
        </div>        
        <div class="mb-3">
            <label for="inputPassword5" class="form-label">パスワードをもう一度入力する</label>
            <input type="password" id="inputPassword5" class="form-control" aria-labelledby="passwordHelpBlock">
        </div>
        <div>
            <button type="button" class="btn btn-secondary">パスワード再設定する</button>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
</body>
</html>
