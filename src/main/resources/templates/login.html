<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ログイン</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
</head>
<body>
    <div class="container">
        <h2 class="mt-5 mb-3">ログイン</h2>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="emailFormControlInput" class="form-label">メールアドレス</label>
                <input type="email" class="form-control" id="emailFormControlInput" name="email" placeholder="name@example.com" required>
            </div>
            <div class="mb-5">
                <label for="inputPassword5" class="form-label">パスワード</label>
                <input type="password" id="inputPassword5" class="form-control" name="password" aria-labelledby="passwordHelpBlock" required>
            </div>
            <div class="mb-5">
                <button type="submit" class="btn btn-secondary">ログイン</button>
            </div>
        </form>
        <div>
            <a th:href="@{/signup}">新規会員登録はこちら</a>
